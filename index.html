    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e7;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --purple: #a855f7;
            --pink: #ec4899;
            --teal: #14b8a6;
            --bgd-color: #8b1538;
            --pgp-color: #1e40af;
        }
        
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .view-toggle {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
        }
        
        .view-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: #a1a1aa;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .view-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .view-btn.bgd.active {
            background: var(--bgd-color);
        }
        
        .view-btn.pgp.active {
            background: var(--pgp-color);
        }
        
        .add-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        
        .search-box {
            padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            color: white;
            width: 300px;
            font-size: 14px;
        }
        
        .search-box::placeholder {
            color: #71717a;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--card-color, var(--primary));
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .stat-card h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a1a1aa;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }
        
        .stat-card .subtitle {
            font-size: 11px;
            color: #71717a;
            margin-top: 5px;
        }
        
        .stage-section {
            margin-bottom: 30px;
            scroll-margin-top: 20px;
        }
        
        .stage-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        
        .stage-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }
        
        .stage-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .stage-count {
            margin-left: auto;
            font-size: 14px;
            color: #71717a;
        }
        
        .leads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
        }
        
        .lead-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .lead-card:hover {
            border-color: rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.08);
        }
        
        .lead-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .lead-org {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }
        
        .lead-stakeholder {
            font-size: 14px;
            color: #a1a1aa;
        }
        
        .lead-designation {
            font-size: 12px;
            color: #71717a;
            margin-top: 2px;
        }
        
        .programme-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .programme-badge.bgd {
            background: rgba(139, 21, 56, 0.3);
            color: #f472b6;
        }
        
        .programme-badge.pgp {
            background: rgba(30, 64, 175, 0.3);
            color: #60a5fa;
        }
        
        .lead-details {
            display: grid;
            gap: 8px;
            margin: 12px 0;
            font-size: 13px;
        }
        
        .lead-detail {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a1a1aa;
        }
        
        .lead-detail svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }
        
        .lead-detail a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .lead-detail a:hover {
            text-decoration: underline;
        }
        
        .lead-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .lead-action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .lead-action-btn.edit {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
        }
        
        .lead-action-btn.edit:hover {
            background: rgba(99, 102, 241, 0.3);
        }
        
        .stage-select {
            padding: 10px 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            flex: 2;
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal {
            background: #1e1e2e;
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #71717a;
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
        }
        
        .close-btn:hover {
            color: white;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        .form-group label {
            font-size: 13px;
            color: #a1a1aa;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .modal-footer {
            padding: 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--purple));
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .notes-preview {
            font-size: 12px;
            color: #71717a;
            font-style: italic;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        
        .meeting-date {
            font-size: 12px;
            color: var(--warning);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .export-btn {
            padding: 10px 16px;
            background: rgba(34, 197, 94, 0.2);
            border: none;
            border-radius: 10px;
            color: #4ade80;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        
        .export-btn:hover {
            background: rgba(34, 197, 94, 0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #71717a;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-box {
                width: 100%;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
            
            .leads-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
    </svg>
);

// Main App Component
function App() {
    const [leads, setLeads] = useState([]);
    const [searchTerm, setSearchTerm] = useState('');
    const [activeView, setActiveView] = useState('all'); // 'all', 'bgd', 'pgp'
    const [showModal, setShowModal] = useState(false);
    const [editingLead, setEditingLead] = useState(null);
    const stageRefs = useRef({});

    // Initialize leads from localStorage or INITIAL_LEADS
    useEffect(() => {
        const savedLeads = localStorage.getItem('funnelTrackerLeads');
        if (savedLeads) {
            setLeads(JSON.parse(savedLeads));
        } else {
            setLeads(INITIAL_LEADS);
        }
    }, []);

    // Save to localStorage when leads change
    useEffect(() => {
        if (leads.length > 0) {
            localStorage.setItem('funnelTrackerLeads', JSON.stringify(leads));
        }
    }, [leads]);

    // Filter leads based on search and view
    const filteredLeads = leads.filter(lead => {
        const matchesSearch = 
            lead.organisation.toLowerCase().includes(searchTerm.toLowerCase()) ||
            lead.stakeholder.toLowerCase().includes(searchTerm.toLowerCase()) ||
            lead.industry.toLowerCase().includes(searchTerm.toLowerCase()) ||
            lead.location.toLowerCase().includes(searchTerm.toLowerCase());
        
        const matchesView = 
            activeView === 'all' || 
            lead.programme.toLowerCase() === activeView;
        
        return matchesSearch && matchesView;
    });

    // Calculate stats
    const getStats = (filterProgramme = null) => {
        const filtered = filterProgramme 
            ? leads.filter(l => l.programme.toLowerCase() === filterProgramme)
            : leads;
        
        const stats = {
            total: filtered.length,
            contacted: filtered.filter(l => CONTACTED_STAGES.includes(l.stage)).length
        };
        
        STAGES.forEach(stage => {
            stats[stage.id] = filtered.filter(l => l.stage === stage.id).length;
        });
        
        return stats;
    };

    const currentStats = activeView === 'all' 
        ? getStats() 
        : getStats(activeView);

    // Scroll to stage section
    const scrollToStage = (stageId) => {
        if (stageRefs.current[stageId]) {
            stageRefs.current[stageId].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    };

    // Update lead stage
    const updateLeadStage = (leadId, newStage) => {
        setLeads(prev => prev.map(lead => 
            lead.id === leadId ? { ...lead, stage: newStage } : lead
        ));
    };

    // Save lead (add or update)
    const saveLead = (leadData) => {
        if (editingLead) {
            setLeads(prev => prev.map(lead => 
                lead.id === editingLead.id ? { ...lead, ...leadData } : lead
            ));
        } else {
            const newLead = {
                ...leadData,
                id: Math.max(...leads.map(l => l.id), 0) + 1
            };
            setLeads(prev => [...prev, newLead]);
        }
        setShowModal(false);
        setEditingLead(null);
    };

    // Export to CSV
    const exportToCSV = () => {
        const headers = ['Organisation', 'Stakeholder', 'Designation', 'Email', 'Phone', 'Location', 'Industry', 'Main Business', 'LinkedIn', 'Point of Contact', 'Stage', 'Programme', 'Meeting Date', 'Notes'];
        const rows = filteredLeads.map(lead => [
            lead.organisation,
            lead.stakeholder,
            lead.designation,
            lead.email,
            lead.phone,
            lead.location,
            lead.industry,
            lead.mainBusiness,
            lead.linkedin,
            lead.pointOfContact,
            lead.stage,
            lead.programme,
            lead.meetingDate,
            lead.notes
        ]);
        
        const csvContent = [headers, ...rows]
            .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
            .join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `funnel-tracker-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    };

    // Group leads by stage
    const groupedLeads = {};
    STAGES.forEach(stage => {
        groupedLeads[stage.id] = filteredLeads.filter(l => l.stage === stage.id);
    });

    return (
        <div className="app-container">
            {/* Header */}
            <header className="header">
                <h1>🎯 Client Funnel Tracker</h1>
                <div className="header-actions">
                    <input 
                        type="text"
                        className="search-box"
                        placeholder="Search leads..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                    />
                    <div className="view-toggle">
                        <button 
                            className={`view-btn ${activeView === 'all' ? 'active' : ''}`}
                            onClick={() => setActiveView('all')}
                        >
                            All ({getStats().total})
                        </button>
                        <button 
                            className={`view-btn bgd ${activeView === 'bgd' ? 'active' : ''}`}
                            onClick={() => setActiveView('bgd')}
                        >
                            BGD ({getStats('bgd').total})
                        </button>
                        <button 
                            className={`view-btn pgp ${activeView === 'pgp' ? 'active' : ''}`}
                            onClick={() => setActiveView('pgp')}
                        >
                            PGP ({getStats('pgp').total})
                        </button>
                    </div>
                    <button className="export-btn" onClick={exportToCSV}>
                        📥 Export CSV
                    </button>
                    <button className="add-btn" onClick={() => { setEditingLead(null); setShowModal(true); }}>
                        + Add Lead
                    </button>
                </div>
            </header>

            {/* Dashboard Stats */}
            <div className="dashboard">
                <div 
                    className="stat-card" 
                    style={{'--card-color': '#6366f1'}}
                    onClick={() => scrollToStage('New Lead')}
                >
                    <h3>New Leads</h3>
                    <div className="value">{currentStats['New Lead']}</div>
                    <div className="subtitle">Ready for outreach</div>
                </div>
                <div 
                    className="stat-card"
                    style={{'--card-color': '#3b82f6'}}
                    onClick={() => scrollToStage('Email Sent')}
                >
                    <h3>Contacted</h3>
                    <div className="value">{currentStats.contacted}</div>
                    <div className="subtitle">In pipeline</div>
                </div>
                <div 
                    className="stat-card"
                    style={{'--card-color': '#f59e0b'}}
                    onClick={() => scrollToStage('Meeting Scheduled')}
                >
                    <h3>Meetings</h3>
                    <div className="value">{currentStats['Meeting Scheduled']}</div>
                    <div className="subtitle">Scheduled</div>
                </div>
                <div 
                    className="stat-card"
                    style={{'--card-color': '#a855f7'}}
                    onClick={() => scrollToStage('Proposal Sent')}
                >
                    <h3>Proposals</h3>
                    <div className="value">{currentStats['Proposal Sent']}</div>
                    <div className="subtitle">Sent</div>
                </div>
                <div 
                    className="stat-card"
                    style={{'--card-color': '#ec4899'}}
                    onClick={() => scrollToStage('Negotiation')}
                >
                    <h3>Negotiation</h3>
                    <div className="value">{currentStats['Negotiation']}</div>
                    <div className="subtitle">In progress</div>
                </div>
                <div 
                    className="stat-card"
                    style={{'--card-color': '#22c55e'}}
                    onClick={() => scrollToStage('Converted')}
                >
                    <h3>Converted</h3>
                    <div className="value">{currentStats['Converted']}</div>
                    <div className="subtitle">Won deals</div>
                </div>
                <div 
                    className="stat-card"
                    style={{'--card-color': '#ef4444'}}
                    onClick={() => scrollToStage('Lost')}
                >
                    <h3>Lost</h3>
                    <div className="value">{currentStats['Lost']}</div>
                    <div className="subtitle">Closed</div>
                </div>
            </div>

            {/* Stage Sections */}
            {STAGES.map(stage => (
                <div 
                    key={stage.id} 
                    className="stage-section"
                    ref={el => stageRefs.current[stage.id] = el}
                >
                    <div className="stage-header">
                        <span 
                            className="stage-badge"
                            style={{ background: stage.color }}
                        >
                            {stage.label}
                        </span>
                        <h2>{stage.label}</h2>
                        <span className="stage-count">
                            {groupedLeads[stage.id].length} leads
                        </span>
                    </div>
                    
                    {groupedLeads[stage.id].length > 0 ? (
                        <div className="leads-grid">
                            {groupedLeads[stage.id].map(lead => (
                                <LeadCard 
                                    key={lead.id}
                                    lead={lead}
                                    onEdit={() => { setEditingLead(lead); setShowModal(true); }}
                                    onStageChange={(newStage) => updateLeadStage(lead.id, newStage)}
                                />
                            ))}
                        </div>
                    ) : (
                        <div className="empty-state">
                            No leads in this stage
                        </div>
                    )}
                </div>
            ))}

            {/* Modal */}
            {showModal && (
                <LeadModal
                    lead={editingLead}
                    onSave={saveLead}
                    onClose={() => { setShowModal(false); setEditingLead(null); }}
                />
            )}
        </div>
    );
}

// Lead Card Component
function LeadCard({ lead, onEdit, onStageChange }) {
    return (
        <div className="lead-card">
            <div className="lead-card-header">
                <div>
                    <div className="lead-org">{lead.organisation}</div>
                    <div className="lead-stakeholder">{lead.stakeholder}</div>
                    {lead.designation && (
                        <div className="lead-designation">{lead.designation}</div>
                    )}
                </div>
                <span className={`programme-badge ${lead.programme.toLowerCase()}`}>
                    {lead.programme}
                </span>
            </div>
            
            <div className="lead-details">
                {lead.email && (
                    <div className="lead-detail">
                        <EmailIcon />
                        <a href={`mailto:${lead.email.split(',')[0].trim()}`}>
                            {lead.email.split(',')[0].trim()}
                        </a>
                    </div>
                )}
                {lead.phone && (
                    <div className="lead-detail">
                        <PhoneIcon />
                        <span>{lead.phone}</span>
                    </div>
                )}
                {lead.location && (
                    <div className="lead-detail">
                        <LocationIcon />
                        <span>{lead.location}</span>
                    </div>
                )}
                {lead.industry && (
                    <div className="lead-detail">
                        <IndustryIcon />
                        <span>{lead.industry}</span>
                    </div>
                )}
                {lead.pointOfContact && (
                    <div className="lead-detail">
                        <UserIcon />
                        <span>PoC: {lead.pointOfContact}</span>
                    </div>
                )}
                {lead.linkedin && lead.linkedin !== 'N.A' && lead.linkedin.includes('linkedin') && (
                    <div className="lead-detail">
                        <LinkedInIcon />
                        <a href={lead.linkedin.split(',')[0].trim()} target="_blank" rel="noopener noreferrer">
                            LinkedIn Profile
                        </a>
                    </div>
                )}
                {lead.meetingDate && (
                    <div className="meeting-date">
                        <CalendarIcon />
                        <span>Meeting: {lead.meetingDate}</span>
                    </div>
                )}
            </div>
            
            {lead.notes && (
                <div className="notes-preview">
                    {lead.notes.substring(0, 100)}{lead.notes.length > 100 ? '...' : ''}
                </div>
            )}
            
            <div className="lead-actions">
                <button className="lead-action-btn edit" onClick={onEdit}>
                    ✏️ Edit
                </button>
                <select 
                    className="stage-select"
                    value={lead.stage}
                    onChange={(e) => onStageChange(e.target.value)}
                >
                    {STAGES.map(stage => (
                        <option key={stage.id} value={stage.id}>
                            {stage.label}
                        </option>
                    ))}
                </select>
            </div>
        </div>
    );
}

// Lead Modal Component
function LeadModal({ lead, onSave, onClose }) {
    const [formData, setFormData] = useState(lead || {
        organisation: '',
        stakeholder: '',
        designation: '',
        email: '',
        phone: '',
        location: '',
        industry: '',
        mainBusiness: '',
        linkedin: '',
        pointOfContact: '',
        stage: 'New Lead',
        programme: 'BGD',
        meetingDate: '',
        notes: ''
    });

    const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
    };

    const handleSubmit = (e) => {
        e.preventDefault();
        onSave(formData);
    };

    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                    <h2>{lead ? 'Edit Lead' : 'Add New Lead'}</h2>
                    <button className="close-btn" onClick={onClose}>×</button>
                </div>
                <form onSubmit={handleSubmit}>
                    <div className="modal-body">
                        <div className="form-grid">
                            <div className="form-group">
                                <label>Organisation *</label>
                                <input 
                                    type="text"
                                    name="organisation"
                                    value={formData.organisation}
                                    onChange={handleChange}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label>Stakeholder Name</label>
                                <input 
                                    type="text"
                                    name="stakeholder"
                                    value={formData.stakeholder}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Designation</label>
                                <input 
                                    type="text"
                                    name="designation"
                                    value={formData.designation}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Email</label>
                                <input 
                                    type="text"
                                    name="email"
                                    value={formData.email}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Phone</label>
                                <input 
                                    type="text"
                                    name="phone"
                                    value={formData.phone}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Location</label>
                                <input 
                                    type="text"
                                    name="location"
                                    value={formData.location}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Industry</label>
                                <input 
                                    type="text"
                                    name="industry"
                                    value={formData.industry}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Main Business</label>
                                <input 
                                    type="text"
                                    name="mainBusiness"
                                    value={formData.mainBusiness}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>LinkedIn URL</label>
                                <input 
                                    type="text"
                                    name="linkedin"
                                    value={formData.linkedin}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Point of Contact</label>
                                <input 
                                    type="text"
                                    name="pointOfContact"
                                    value={formData.pointOfContact}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group">
                                <label>Programme</label>
                                <select 
                                    name="programme"
                                    value={formData.programme}
                                    onChange={handleChange}
                                >
                                    <option value="BGD">BGD</option>
                                    <option value="PGP">PGP</option>
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Stage</label>
                                <select 
                                    name="stage"
                                    value={formData.stage}
                                    onChange={handleChange}
                                >
                                    {STAGES.map(stage => (
                                        <option key={stage.id} value={stage.id}>
                                            {stage.label}
                                        </option>
                                    ))}
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Meeting Date</label>
                                <input 
                                    type="date"
                                    name="meetingDate"
                                    value={formData.meetingDate}
                                    onChange={handleChange}
                                />
                            </div>
                            <div className="form-group full-width">
                                <label>Notes</label>
                                <textarea 
                                    name="notes"
                                    value={formData.notes}
                                    onChange={handleChange}
                                    placeholder="Add any additional notes..."
                                />
                            </div>
                        </div>
                    </div>
                    <div className="modal-footer">
                        <button type="button" className="btn btn-secondary" onClick={onClose}>
                            Cancel
                        </button>
                        <button type="submit" className="btn btn-primary">
                            {lead ? 'Update Lead' : 'Add Lead'}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    );
}

// Render the app
ReactDOM.render(<App />, document.getElementById('root'));

    </script>
</body>
</html>
